<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>Activar licencia</title>
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="license.css" />
</head>
<body>
  <main class="license-page">
    <div class="license-card">
      <h1>Activar acceso</h1>
      <p class="subtitle">
        Ingresa tu licencia. Esta activación quedará vinculada a este dispositivo.
      </p>

      <div id="licenseDisplay" class="license-display">----</div>

      <div class="license-keyboard">
        <button class="license-key" data-value="A" type="button">A</button>
        <button class="license-key" data-value="B" type="button">B</button>
        <button class="license-key" data-value="C" type="button">C</button>

        <button class="license-key" data-value="D" type="button">D</button>
        <button class="license-key" data-value="E" type="button">E</button>
        <button class="license-key" data-value="F" type="button">F</button>

        <button class="license-key" data-value="G" type="button">G</button>
        <button class="license-key" data-value="H" type="button">H</button>
        <button class="license-key" data-value="I" type="button">I</button>

        <button class="license-key" data-value="J" type="button">J</button>
        <button class="license-key" data-value="K" type="button">K</button>
        <button class="license-key" data-value="L" type="button">L</button>

        <button class="license-key" data-value="M" type="button">M</button>
        <button class="license-key" data-value="N" type="button">N</button>
        <button class="license-key" data-value="O" type="button">O</button>

        <button class="license-key" data-value="P" type="button">P</button>
        <button class="license-key" data-value="Q" type="button">Q</button>
        <button class="license-key" data-value="R" type="button">R</button>

        <button class="license-key" data-value="S" type="button">S</button>
        <button class="license-key" data-value="T" type="button">T</button>
        <button class="license-key" data-value="U" type="button">U</button>

        <button class="license-key" data-value="V" type="button">V</button>
        <button class="license-key" data-value="W" type="button">W</button>
        <button class="license-key" data-value="X" type="button">X</button>

        <button class="license-key" data-value="Y" type="button">Y</button>
        <button class="license-key" data-value="Z" type="button">Z</button>
        <button class="license-key" data-value="1" type="button">1</button>

        <button class="license-key" data-value="2" type="button">2</button>
        <button class="license-key" data-value="3" type="button">3</button>
        <button class="license-key" data-value="4" type="button">4</button>

        <button class="license-key" data-value="5" type="button">5</button>
        <button class="license-key" data-value="6" type="button">6</button>
        <button class="license-key" data-value="7" type="button">7</button>

        <button class="license-key" data-value="8" type="button">8</button>
        <button class="license-key" data-value="9" type="button">9</button>
        <button class="license-key" data-value="0" type="button">0</button>
      </div>

      <div class="license-actions">
        <button id="deleteBtn" class="secondary-btn" type="button">Borrar</button>
        <button id="clearBtn" class="secondary-btn" type="button">Limpiar</button>
      </div>

      <button id="activateBtn" class="activate-btn" type="button">
        Activar
      </button>

      <p id="licenseMsg" class="license-msg"></p>
    </div>
  </main>

  <script src="license.js"></script>
</body>
</html>
