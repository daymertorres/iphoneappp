<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>Activar licencia</title>
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="license.css" />
</head>
<body>
  <main class="license-page">
    <div class="license-card">
      <h1>Activar acceso</h1>
      <p class="subtitle">
        Ingresa tu licencia. Esta activación quedará vinculada a este dispositivo.
      </p>

      <form id="licenseForm" novalidate>
        <input
          id="licenseInput"
          class="license-input"
          type="text"
          inputmode="text"
          enterkeyhint="done"
          placeholder="XXXX-XXXX-XXXX-XXXX"
          autocomplete="off"
          autocapitalize="characters"
          autocorrect="off"
          spellcheck="false"
          readonly
        />

        <button id="focusBtn" class="focus-btn" type="button">
          Escribir licencia
        </button>

        <button id="activateBtn" class="activate-btn" type="submit">
          Activar
        </button>

        <p id="licenseMsg" class="license-msg"></p>
      </form>
    </div>
  </main>

  <script src="license.js"></script>
</body>
</html>
