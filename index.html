<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>Teléfono</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Teléfono" />
  <meta name="theme-color" content="#000000" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="screen">
      <header class="topbar">
        <div class="top-left">
          <div class="carrier-badge">P</div>
          <div class="carrier-arrows">
            <span>⌃</span>
            <span>⌄</span>
          </div>
        </div>

        <div class="top-right">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M18 14c1.66 0 3 1.34 3 3v3h-2v-2.17a3.001 3.001 0 0 0-2.83-2.99L16 14h2zm-8 0c2.76 0 5 2.24 5 5v1H5v-1c0-2.76 2.24-5 5-5zm0 2c-1.67 0-3 1.33-3 3h6c0-1.67-1.33-3-3-3zm6-14c2.21 0 4 1.79 4 4s-1.79 4-4 4-4-1.79-4-4 1.79-4 4-4zm0 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4zM8 3c2.21 0 4 1.79 4 4S10.21 11 8 11 4 9.21 4 7s1.79-4 4-4zm0 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"
            />
            <circle cx="19" cy="18" r="4.25" fill="none" stroke="currentColor" stroke-width="1.8"/>
            <path d="M19 16.7v2.6M17.7 18h2.6" stroke="#000" stroke-width="0"/>
          </svg>
        </div>
      </header>

      <main class="dialer-area">
        <div id="display" class="display"> </div>

        <div class="keypad">
          <button class="key" data-value="1">
            <span class="digit">1</span>
          </button>

          <button class="key" data-value="2">
            <span class="digit">2</span>
            <span class="letters">ABC</span>
          </button>

          <button class="key" data-value="3">
            <span class="digit">3</span>
            <span class="letters">DEF</span>
          </button>

          <button class="key" data-value="4">
            <span class="digit">4</span>
            <span class="letters">GHI</span>
          </button>

          <button class="key" data-value="5">
            <span class="digit">5</span>
            <span class="letters">JKL</span>
          </button>

          <button class="key" data-value="6">
            <span class="digit">6</span>
            <span class="letters">MNO</span>
          </button>

          <button class="key" data-value="7">
            <span class="digit">7</span>
            <span class="letters">PQRS</span>
          </button>

          <button class="key" data-value="8">
            <span class="digit">8</span>
            <span class="letters">TUV</span>
          </button>

          <button class="key" data-value="9">
            <span class="digit">9</span>
            <span class="letters">WXYZ</span>
          </button>

          <button class="key" data-value="*">
            <span class="digit">*</span>
          </button>

          <button class="key" data-value="0">
            <span class="digit">0</span>
            <span class="letters plus">+</span>
          </button>

          <button class="key" data-value="#">
            <span class="digit">#</span>
          </button>
        </div>

        <div class="actions-row">
          <div class="actions-spacer"></div>

          <button id="callBtn" class="call-btn" aria-label="Llamar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M20.52 15.38c-1.23 0-2.42-.2-3.53-.57a1 1 0 0 0-1 .24l-2.2 2.2a15.06 15.06 0 0 1-6.04-6.04l2.2-2.2a1 1 0 0 0 .24-1 11.2 11.2 0 0 1-.57-3.53A1.5 1.5 0 0 0 8.12 3H4.5A1.5 1.5 0 0 0 3 4.5C3 14.17 10.83 22 20.5 22a1.5 1.5 0 0 0 1.5-1.5v-3.62a1.5 1.5 0 0 0-1.48-1.5z"
              />
            </svg>
          </button>

          <button id="deleteBtn" class="delete-btn" aria-label="Borrar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9.2 5h6.18a2 2 0 0 1 1.41.59l4.62 4.62a1 1 0 0 1 0 1.41l-4.62 4.62a2 2 0 0 1-1.41.59H9.2a2 2 0 0 1-1.41-.59L2.17 10.62a1 1 0 0 1 0-1.41L7.79 5.59A2 2 0 0 1 9.2 5z"/>
              <path d="M10 8l5 5M15 8l-5 5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </main>

      <nav class="bottom-tabs">
        <button class="tab">
          <span class="tab-icon">★</span>
          <span class="tab-label">Favoritos</span>
        </button>

        <button class="tab">
          <span class="tab-icon">◔</span>
          <span class="tab-label">Recientes</span>
        </button>

        <button class="tab">
          <span class="tab-icon">◉</span>
          <span class="tab-label">Contactos</span>
        </button>

        <button class="tab active">
          <span class="tab-grid" aria-hidden="true">
            <i></i><i></i><i></i>
            <i></i><i></i><i></i>
            <i></i><i></i><i></i>
          </span>
          <span class="tab-label">Teclado</span>
        </button>

        <button class="tab">
          <span class="tab-icon voicemail">◉◉</span>
          <span class="tab-label">Buzón de voz</span>
        </button>
      </nav>

      <div class="home-indicator"></div>
    </div>
  </div>

  <div id="infoOverlay" class="overlay hidden">
    <div class="info-sheet">
      <button id="closeInfoBtn" class="cancel-btn">Cancelar</button>

      <div class="info-content">
        <h1>Información</h1>

        <div class="info-block">
          <div class="info-label">EID</div>
          <div id="eidValue" class="info-value eid"></div>
          <div id="eidBarcode" class="barcode-box"></div>
        </div>

        <div class="info-block">
          <div id="imei1Value" class="info-value imei-line"></div>
          <div id="imei1Barcode" class="barcode-box"></div>
        </div>

        <div class="info-block">
          <div id="imei2Value" class="info-value imei-line"></div>
          <div id="imei2Barcode" class="barcode-box"></div>
        </div>
      </div>

      <div class="sheet-home-indicator"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
